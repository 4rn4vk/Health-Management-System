# fly.toml — Fly.io deployment config for the HCMS backend
# Run `fly launch --no-deploy` once to register the app, then `fly deploy`.

app = "hcms-backend"        # change to your chosen app name
primary_region = "iad"      # us-east (Virginia) — change if you prefer another region

[build]
  dockerfile = "Dockerfile"
  target = "production"

[env]
  ENVIRONMENT       = "production"
  USE_SECRETS_MANAGER = "false"
  ENABLE_UPLOADS    = "false"
  AWS_DEFAULT_REGION = "us-east-1"
  # Dummy AWS creds (no real AWS used, but boto3 requires them)
  AWS_ACCESS_KEY_ID     = "unused"
  AWS_SECRET_ACCESS_KEY = "unused"

[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1

[deploy]
  # Runs inside the new container before traffic is switched over.
  # Migrations are idempotent; seed checks for existing data before inserting.
  release_command = "sh -c 'alembic upgrade head && python scripts/seed.py'"
