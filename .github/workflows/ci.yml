name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-lint-test:
    name: Backend — lint & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hcms
          POSTGRES_PASSWORD: hcmspassword
          POSTGRES_DB: hcms_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://hcms:hcmspassword@localhost:5432/hcms_test
      SECRET_KEY: ci-secret-key-for-testing-only
      ENVIRONMENT: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      USE_SECRETS_MANAGER: "false"
      LOCALSTACK_ENDPOINT_URL: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -e ".[dev]" aiosqlite

      - name: Ruff lint
        working-directory: backend
        run: ruff check app tests

      - name: Mypy type-check
        working-directory: backend
        run: mypy app --ignore-missing-imports

      - name: Run tests
        working-directory: backend
        run: pytest --cov=app --cov-report=xml --cov-fail-under=70

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend

  frontend-lint-test:
    name: Frontend — lint & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: TypeScript check
        working-directory: frontend
        run: npm run type-check

      - name: Vitest unit tests
        working-directory: frontend
        run: npm test

  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-test]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Copy env
        run: cp .env.example .env

      - name: Start stack
        run: docker compose up -d --wait
        timeout-minutes: 5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Playwright
        working-directory: frontend
        run: npm ci && npx playwright install --with-deps chromium

      - name: Run migrations + seed
        run: |
          docker compose exec -T backend alembic upgrade head
          docker compose exec -T backend python scripts/seed.py

      - name: Playwright tests
        working-directory: frontend
        env:
          CI: "true"
        run: npx playwright test --reporter=github

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Tear down stack
        if: always()
        run: docker compose down -v
